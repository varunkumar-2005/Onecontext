services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - onecontext-redis:/data
  realtime:
    build:
      context: .
      dockerfile: apps/realtime-sync/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      REALTIME_PORT: 8787
    ports:
      - "8787:8787"
    depends_on:
      - redis
volumes:
  onecontext-redis:
